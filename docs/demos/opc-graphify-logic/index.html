<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OPC 证据自动化与董事长问诊点状图</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --paper: #ffffff;
      --ink: #172033;
      --muted: #637083;
      --line: #d9e0e8;
      --soft: #eef2f6;
      --blue: #2563eb;
      --teal: #0f9f8f;
      --green: #23835b;
      --amber: #b7791f;
      --red: #c2413b;
      --violet: #7c3aed;
      --shadow: 0 22px 64px rgba(23, 32, 51, .10);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 14%, rgba(37, 99, 235, .10), transparent 34%),
        linear-gradient(180deg, #f9fafb 0%, #f3f5f8 100%);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      width: 100vw;
      height: 100vh;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(260px, 1.2fr) minmax(280px, .8fr);
      gap: 20px;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(217, 224, 232, .88);
      background: rgba(255, 255, 255, .84);
      backdrop-filter: blur(18px);
      box-shadow: 0 16px 42px rgba(23, 32, 51, .06);
    }

    .title h1 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.18;
      font-weight: 850;
      color: #101828;
    }

    .title p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat {
      min-width: 0;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .stat strong {
      display: block;
      font-size: 19px;
      line-height: 1;
      color: #111827;
    }

    .stat span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .workspace {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr) 330px;
      min-height: 0;
    }

    .panel {
      min-height: 0;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, .72);
      backdrop-filter: blur(16px);
    }

    .panel.right {
      border-right: 0;
      border-left: 1px solid var(--line);
    }

    .panel-inner {
      height: 100%;
      overflow: auto;
      padding: 16px;
    }

    .section-title {
      margin: 4px 0 10px;
      color: #344054;
      font-size: 12px;
      font-weight: 800;
    }

    .search {
      position: relative;
      margin-bottom: 14px;
    }

    .search input {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      outline: 0;
      color: var(--ink);
      background: #fff;
    }

    .search input:focus {
      border-color: rgba(37, 99, 235, .65);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }

    .filter-list,
    .path-list {
      display: grid;
      gap: 8px;
    }

    .filter,
    .path-button {
      display: grid;
      grid-template-columns: 12px minmax(0, 1fr) auto;
      gap: 9px;
      align-items: center;
      width: 100%;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #344054;
      background: #fff;
      text-align: left;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .path-button {
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .filter:hover,
    .path-button:hover,
    .filter.active,
    .path-button.active {
      transform: translateY(-1px);
      border-color: rgba(37, 99, 235, .52);
      box-shadow: 0 12px 30px rgba(23, 32, 51, .08);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
    }

    .filter b,
    .path-button b {
      overflow: hidden;
      font-size: 13px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .filter small,
    .path-button small {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .legend-note {
      margin: 14px 0 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #4b5563;
      background: rgba(255, 255, 255, .74);
      font-size: 12px;
      line-height: 1.65;
    }

    .graph-shell {
      position: relative;
      min-width: 0;
      min-height: 0;
      background:
        linear-gradient(rgba(23, 32, 51, .04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23, 32, 51, .04) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .graph-toolbar {
      position: absolute;
      z-index: 4;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .mode-switch,
    .zoom-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 6px;
      border: 1px solid rgba(217, 224, 232, .92);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .88);
      box-shadow: 0 14px 36px rgba(23, 32, 51, .08);
      backdrop-filter: blur(16px);
      pointer-events: auto;
    }

    .mode-button,
    .tool-button {
      min-height: 32px;
      padding: 0 10px;
      border: 1px solid transparent;
      border-radius: 7px;
      color: #475467;
      background: transparent;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .mode-button:hover,
    .tool-button:hover,
    .mode-button.active {
      color: #111827;
      border-color: rgba(37, 99, 235, .32);
      background: #fff;
    }

    .tool-button {
      width: 34px;
      padding: 0;
      font-size: 15px;
    }

    .tool-button.wide {
      width: auto;
      padding: 0 10px;
      font-size: 12px;
    }

    .graph-badge {
      position: absolute;
      left: 16px;
      bottom: 16px;
      max-width: min(420px, calc(100% - 32px));
      padding: 11px 13px;
      border: 1px solid rgba(217, 224, 232, .92);
      border-radius: var(--radius);
      color: #475467;
      background: rgba(255, 255, 255, .86);
      box-shadow: 0 14px 38px rgba(23, 32, 51, .08);
      backdrop-filter: blur(16px);
      font-size: 12px;
      line-height: 1.55;
    }

    .detail-head {
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .detail-head .group-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .detail-head h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
      font-weight: 850;
      color: #101828;
    }

    .detail-card {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .detail-card h3 {
      margin: 0 0 8px;
      color: #344054;
      font-size: 12px;
      font-weight: 850;
    }

    .detail-card p,
    .detail-card li {
      color: #4b5563;
      font-size: 13px;
      line-height: 1.62;
    }

    .detail-card p {
      margin: 0;
    }

    .detail-card ul {
      display: grid;
      gap: 6px;
      margin: 0;
      padding-left: 18px;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 220px;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    @media (max-width: 1180px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .panel,
      .panel.right {
        border: 0;
        border-bottom: 1px solid var(--line);
      }

      .panel-inner {
        overflow: visible;
      }

      .filter-list,
      .path-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .graph-toolbar {
        position: sticky;
        top: 8px;
        align-items: stretch;
        flex-direction: column;
      }

      .mode-switch,
      .zoom-controls {
        width: 100%;
      }

      .mode-button {
        flex: 1 1 auto;
      }

      .graph-shell {
        height: 72vh;
        min-height: 560px;
      }
    }

    @media (max-width: 680px) {
      .topbar {
        padding: 14px;
      }

      .stats,
      .filter-list,
      .path-list {
        grid-template-columns: 1fr;
      }

      .title h1 {
        font-size: 19px;
      }

      .graph-shell {
        height: 640px;
        min-height: 640px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title">
        <h1>OPC 证据自动化与董事长问诊点状图</h1>
        <p>由两段 Mermaid 业务逻辑整理成 graphify 风格 H5：自动采集、人工入库、本地处理、董事长确认、飞书同步、材料保留与问诊输出放在同一张关系网里。</p>
      </div>
      <div class="stats" aria-label="图谱统计">
        <div class="stat"><strong id="nodeCount">0</strong><span>节点</span></div>
        <div class="stat"><strong id="edgeCount">0</strong><span>关系</span></div>
        <div class="stat"><strong id="groupCount">0</strong><span>分组</span></div>
      </div>
    </header>

    <main class="workspace">
      <aside class="panel">
        <div class="panel-inner">
          <div class="search">
            <input id="searchInput" type="search" placeholder="搜索节点，例如 董事长、Figma、飞书、冲突" />
          </div>

          <div class="section-title">按业务分组看</div>
          <div class="filter-list" id="filters"></div>

          <div class="section-title" style="margin-top:18px;">关键链路</div>
          <div class="path-list" id="paths"></div>

          <div class="legend-note">
            这张图按“点状分布”组织：点是具体动作或资料库，线是上下游关系。颜色代表业务分组，较大的点表示跨链路关键节点。
          </div>
        </div>
      </aside>

      <section class="graph-shell">
        <div class="graph-toolbar" aria-label="图谱控制">
          <div class="mode-switch" id="modeSwitch"></div>
          <div class="zoom-controls">
            <button class="tool-button" id="zoomOut" type="button" aria-label="缩小">−</button>
            <button class="tool-button" id="zoomIn" type="button" aria-label="放大">+</button>
            <button class="tool-button wide" id="fitView" type="button">复位</button>
            <button class="tool-button wide" id="unlockNodes" type="button">解锁</button>
          </div>
        </div>
        <canvas id="graphCanvas" aria-label="OPC 业务逻辑点状关系图"></canvas>
        <div class="graph-badge" id="graphBadge">当前是主链总览，只显示关键节点。拖动空白处移动图；拖动节点可手动摆放，拖完会固定。</div>
      </section>

      <aside class="panel right">
        <div class="panel-inner" id="detailPanel">
          <div class="empty">点选图上的节点后，这里会显示它的上游、下游和这一步要落到哪里。</div>
        </div>
      </aside>
    </main>
  </div>

  <script>
    const groups = {

      package: { name: "包诊断", color: "#16a34a", x: 660, y: 580, note: "按 Figma 包追材料、功能、页面、确认、问题和任务。" },

    function buildModes() {
      for (const [key, mode] of Object.entries(modes)) {
        const btn = document.createElement("button");
        btn.className = `mode-button${key === activeMode ? " active" : ""}`;
        btn.dataset.mode = key;
        btn.type = "button";
        btn.textContent = mode.name;
        modeSwitchEl.appendChild(btn);
      }

      modeSwitchEl.addEventListener("click", (event) => {
        const btn = event.target.closest("button");
        if (!btn) return;
        setMode(btn.dataset.mode);
      });
    }

    function buildFilters() {
      const all = document.createElement("button");
      all.className = "filter active";
      all.dataset.group = "all";
      all.innerHTML = `<span class="dot" style="background:#111827"></span><b>全部节点</b><small>${nodes.length}</small>`;
      filtersEl.appendChild(all);

      for (const [key, group] of Object.entries(groups)) {
        const count = nodes.filter((n) => n.group === key).length;
        const btn = document.createElement("button");
        btn.className = "filter";
        btn.dataset.group = key;
        btn.innerHTML = `<span class="dot" style="background:${group.color}"></span><b>${escapeHTML(group.name)}</b><small>${count}</small>`;
        filtersEl.appendChild(btn);
      }

      filtersEl.addEventListener("click", (event) => {
        const btn = event.target.closest("button");
        if (!btn) return;
        activeMode = "all";
        activeGroup = btn.dataset.group;
        activePath = null;
        updateControlState();
        selectFirstVisibleNode();
        fitView();
        updateBadge();
      });
    }

        const btn = event.target.closest("button");
        if (!btn) return;
        const key = btn.dataset.path;
        activePath = activePath === key ? null : key;
        activeMode = activePath ? "all" : "overview";
        activeGroup = "all";
        updateControlState();
        selectFirstVisibleNode();
        fitView();
        updateBadge();
      });
    }

    function wireToolbar() {
      zoomInButton.addEventListener("click", () => zoomAtCenter(1.16));
      zoomOutButton.addEventListener("click", () => zoomAtCenter(.86));
      fitViewButton.addEventListener("click", () => fitView());
      unlockNodesButton.addEventListener("click", () => {
        nodes.forEach((n) => {
          n.pinned = false;
        });
        graphBadge.textContent = "已解锁手动拖过的节点，布局会重新靠回分组中心。";
      });
    }

    function setMode(modeKey) {
      activeMode = modeKey;
      activeGroup = "all";
      activePath = null;
      searchTerm = "";
      searchInput.value = "";
      updateControlState();
      selectFirstVisibleNode();
      fitView();
      updateBadge();
    }

    function updateControlState() {
      document.querySelectorAll(".mode-button").forEach((item) => item.classList.toggle("active", item.dataset.mode === activeMode));
      document.querySelectorAll(".filter").forEach((item) => item.classList.toggle("active", item.dataset.group === activeGroup));
      document.querySelectorAll(".path-button").forEach((item) => item.classList.toggle("active", activePath === item.dataset.path));
    }

    function updateBadge() {
      if (activePath) {
        graphBadge.textContent = `${paths[activePath].name}：${paths[activePath].hint}。拖动空白处移动图，拖动节点可手动摆放。`;
        return;
      }
      if (activeGroup !== "all") {
        graphBadge.textContent = `${groups[activeGroup].name}：${groups[activeGroup].note}。当前只看这个分组。`;
        return;
      }
      graphBadge.textContent = `${modes[activeMode].name}：${modes[activeMode].hint}。拖动空白处移动图；拖动节点可手动摆放，拖完会固定。`;
    }

    function selectFirstVisibleNode() {
      const visible = getVisibleNodeSet();
      const next = nodes.find((n) => visible.has(n.id)) || nodes[0];
      if (next) selectNode(next.id);
    }

    function seedLayout() {
      const byGroup = {};
      for (const node of nodes) {
        if (!byGroup[node.group]) byGroup[node.group] = [];
        byGroup[node.group].push(node);
      }
      for (const [groupKey, groupNodes] of Object.entries(byGroup)) {
        const group = groups[groupKey];
        groupNodes.forEach((node, index) => {
          const angle = index * 2.399963 + group.x * .003;
          const radius = 32 + Math.sqrt(index) * 24;
          node.x = group.x + Math.cos(angle) * radius;
          node.y = group.y + Math.sin(angle) * radius;
        });
      }
    }

    function resize() {
      const rect = canvas.getBoundingClientRect();
      width = Math.max(320, rect.width);
      height = Math.max(420, rect.height);
      pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(width * pixelRatio);
      canvas.height = Math.floor(height * pixelRatio);
      ctx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
      fitView();
    }

    function fitView() {
      const bounds = visibleBounds();
      const padding = width < 680 ? 46 : 92;
      const availableW = Math.max(320, width - padding);
      const availableH = Math.max(420, height - padding);
      const boundsW = Math.max(260, bounds.maxX - bounds.minX);
      const boundsH = Math.max(260, bounds.maxY - bounds.minY);
      scale = clamp(Math.min(availableW / boundsW, availableH / boundsH), .46, 1.28);
      offsetX = (width - (bounds.minX + bounds.maxX) * scale) / 2;
      offsetY = (height - (bounds.minY + bounds.maxY) * scale) / 2;
    }

    function visibleBounds() {
      const visible = getVisibleNodeSet();
      const shown = nodes.filter((n) => visible.has(n.id));
      if (!shown.length) return { minX: 0, minY: 0, maxX: world.width, maxY: world.height };
      return shown.reduce((acc, n) => ({
        minX: Math.min(acc.minX, n.x - 90),
        minY: Math.min(acc.minY, n.y - 90),
        maxX: Math.max(acc.maxX, n.x + 90),
        maxY: Math.max(acc.maxY, n.y + 90)
      }), { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity });
    }

    function zoomAtCenter(delta) {
      const point = { x: width / 2, y: height / 2 };
      const before = screenToWorld(point);
      scale = clamp(scale * delta, .36, 2.2);
      offsetX = point.x - before.x * scale;
      offsetY = point.y - before.y * scale;
    }

    function getVisibleNodeSet() {
      if (activePath) return new Set(paths[activePath].nodes);
      if (searchTerm) {
        const matched = new Set(nodes
          .filter((n) => n.label.toLowerCase().includes(searchTerm) || groups[n.group].name.toLowerCase().includes(searchTerm))
          .map((n) => n.id));
        for (const id of [...matched]) {
          const refs = linked.get(id);
          refs.in.forEach((link) => matched.add(link.source));
          refs.out.forEach((link) => matched.add(link.target));
        }
        return matched.size ? matched : new Set();
      }
      if (activeGroup !== "all") {
        return new Set(nodes.filter((n) => n.group === activeGroup).map((n) => n.id));
      }
      if (activeMode !== "all" && modes[activeMode].nodes) {
        return new Set(modes[activeMode].nodes);
      }
      return new Set(nodes.map((n) => n.id));
    }

    function loop() {
      tick();
      draw();
      requestAnimationFrame(loop);
    }

    function tick() {
      const activePathSet = activePath ? new Set(paths[activePath].nodes) : null;
      const visible = getVisibleNodeSet();
      for (const n of nodes) {
        if (!visible.has(n.id) || n.pinned) continue;
        const group = groups[n.group];
        const attraction = n.core ? 0.018 : 0.012;
        n.vx += (group.x - n.x) * attraction;
        n.vy += (group.y - n.y) * attraction;
      }

      for (const link of links) {
        if (!visible.has(link.source) || !visible.has(link.target)) continue;
        const a = nodeById.get(link.source);
        const b = nodeById.get(link.target);
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.max(1, Math.hypot(dx, dy));
        const desired = link.bridge ? 160 : 105;
        const force = (dist - desired) * (link.bridge ? 0.0022 : 0.0038);
        const fx = dx / dist * force;
        const fy = dy / dist * force;
        if (!a.pinned) {
          a.vx += fx;
          a.vy += fy;
        }
        if (!b.pinned) {
          b.vx -= fx;
          b.vy -= fy;
        }
      }

      for (let i = 0; i < nodes.length; i++) {
        const a = nodes[i];
        if (!visible.has(a.id)) continue;
        for (let j = i + 1; j < nodes.length; j++) {
          const b = nodes[j];
          if (!visible.has(b.id)) continue;
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist2 = dx * dx + dy * dy + .01;
          if (dist2 > 38000) continue;
          const force = (a.group === b.group ? 58 : 95) / dist2;
          if (!a.pinned) {
            a.vx -= dx * force;
            a.vy -= dy * force;
          }
          if (!b.pinned) {
            b.vx += dx * force;
            b.vy += dy * force;
          }
        }
      }

      for (const n of nodes) {
        if (!visible.has(n.id) || dragNode === n || n.pinned) continue;
        const visibleBoost = activePathSet && activePathSet.has(n.id) ? 1.02 : 1;
        n.vx *= 0.82;
        n.vy *= 0.82;
        n.x = clamp(n.x + n.vx * visibleBoost, 26, world.width - 26);
        n.y = clamp(n.y + n.vy * visibleBoost, 26, world.height - 26);
      }

      settledTicks++;
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      ctx.save();
      ctx.translate(offsetX, offsetY);
      ctx.scale(scale, scale);

      drawGroupRegions();
      drawLinks();
      drawNodes();

      ctx.restore();
    }

    function drawGroupRegions() {
      const visible = getVisibleNodeSet();
      for (const [key, group] of Object.entries(groups)) {
        const hasVisibleNodes = nodes.some((n) => n.group === key && visible.has(n.id));
        if (!hasVisibleNodes) continue;
        const active = activeGroup === "all" || activeGroup === key || activeMode !== "all" || activePath;
        ctx.save();
        ctx.globalAlpha = active ? .075 : .028;
        ctx.fillStyle = group.color;
        ctx.beginPath();
        ctx.arc(group.x, group.y, key === "daily" || key === "decision" ? 178 : 138, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = active ? .92 : .38;
        ctx.fillStyle = "#334155";
        ctx.font = "700 18px -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif";
        ctx.fillText(group.name, group.x - 48, group.y - (key === "feature" ? 136 : 120));
        ctx.restore();
      }
    }

    function drawLinks() {
      for (const link of links) {
        const a = nodeById.get(link.source);
        const b = nodeById.get(link.target);
        const visibility = edgeVisibility(link);
        if (visibility <= .04) continue;
        drawArrow(a, b, visibility, isPathEdge(link));
      }
    }

    function drawArrow(a, b, alpha, highlighted) {
      const color = highlighted ? "#111827" : mixColor(groups[a.group].color, groups[b.group].color);
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.max(1, Math.hypot(dx, dy));
      const ux = dx / dist;
      const uy = dy / dist;
      const startX = a.x + ux * (a.size + 4);
      const startY = a.y + uy * (a.size + 4);
      const endX = b.x - ux * (b.size + 7);
      const endY = b.y - uy * (b.size + 7);

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = color;
      ctx.lineWidth = highlighted ? 2.6 : 1.15;
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(endX, endY);
      ctx.stroke();

      const arrowSize = highlighted ? 8 : 6;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(endX, endY);
      ctx.lineTo(endX - ux * arrowSize - uy * arrowSize * .55, endY - uy * arrowSize + ux * arrowSize * .55);
      ctx.lineTo(endX - ux * arrowSize + uy * arrowSize * .55, endY - uy * arrowSize - ux * arrowSize * .55);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawNodes() {
      const ordered = nodes.slice().sort((a, b) => nodeVisibility(a) - nodeVisibility(b));
      for (const n of ordered) {
        const visibility = nodeVisibility(n);
        if (visibility <= .03) continue;
        const group = groups[n.group];
        const selected = n.id === selectedId;
        const hovered = n.id === hoveredId;
        const inPath = activePath && paths[activePath].nodes.includes(n.id);
        const searched = searchTerm && n.label.toLowerCase().includes(searchTerm);
        const r = n.size + (selected ? 7 : hovered ? 4 : inPath || searched ? 3 : 0);

        ctx.save();
        ctx.globalAlpha = visibility;
        ctx.shadowColor = selected || hovered ? "rgba(23,32,51,.24)" : "rgba(23,32,51,.12)";
        ctx.shadowBlur = selected || hovered ? 24 : 10;
        ctx.fillStyle = group.color;
        ctx.beginPath();
        ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.lineWidth = selected ? 4 : n.core ? 2.8 : 1.8;
        ctx.strokeStyle = selected ? "#111827" : "rgba(255,255,255,.92)";
        ctx.stroke();

        const compactView = activeMode !== "all" || activePath || activeGroup !== "all" || searchTerm;
        if (selected || hovered || inPath || searched || n.core || compactView && visibility > .85 && scale > .58) {
          const label = trimLabel(n.label, selected || hovered ? 26 : compactView ? 18 : 13);
          ctx.font = `${selected ? 800 : 700} ${selected ? 15 : 12}px -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif`;
          const metrics = ctx.measureText(label);
          const bx = n.x + r + 7;
          const by = n.y - 11;
          ctx.fillStyle = "rgba(255,255,255,.88)";
          roundRect(ctx, bx - 6, by - 1, metrics.width + 12, 23, 7);
          ctx.fill();
          ctx.fillStyle = selected ? "#111827" : "#334155";
          ctx.fillText(label, bx, by + 15);
        }

        ctx.restore();
      }
    }

    function nodeVisibility(n) {
      const visible = getVisibleNodeSet();
      if (!visible.has(n.id)) return 0;
      let value = 1;
      if (searchTerm && !n.label.toLowerCase().includes(searchTerm) && !groups[n.group].name.toLowerCase().includes(searchTerm)) value *= .54;
      if (selectedId) {
        const selectedLinks = linked.get(selectedId);
        const close = selectedId === n.id
          || selectedLinks.in.some((l) => l.source === n.id)
          || selectedLinks.out.some((l) => l.target === n.id);
        if (!close && activeMode === "all" && !activePath && activeGroup === "all" && !searchTerm) value *= .42;
      }
      return value;
    }

    function edgeVisibility(link) {
      const visible = getVisibleNodeSet();
      if (!visible.has(link.source) || !visible.has(link.target)) return 0;
      let value = .52;
      const a = nodeById.get(link.source);
      const b = nodeById.get(link.target);
      if (link.bridge) value = .34;
      if (selectedId && (link.source === selectedId || link.target === selectedId)) value = .95;
      if (activePath && !isPathEdge(link)) value *= .18;
      if (searchTerm && !a.label.toLowerCase().includes(searchTerm) && !b.label.toLowerCase().includes(searchTerm)) value *= .25;
      return value;
    }

    function isPathEdge(link) {
      if (!activePath) return false;
      const pathNodes = paths[activePath].nodes;
      return pathNodes.includes(link.source) && pathNodes.includes(link.target);
    }

    function selectNode(id) {
      selectedId = id;
      const n = nodeById.get(id);
      if (!n) return;
      const group = groups[n.group];
      const refs = linked.get(id);
      const incoming = refs.in.map((link) => `${nodeById.get(link.source).label} - ${link.label}`);
      const outgoing = refs.out.map((link) => `${link.label} - ${nodeById.get(link.target).label}`);

      detailPanel.innerHTML = `
        <div class="detail-head">
          <div class="group-line"><span class="dot" style="background:${group.color}"></span>${escapeHTML(group.name)}</div>
          <h2>${escapeHTML(n.label)}</h2>
        </div>
        <div class="detail-card">
          <h3>这一步做什么</h3>
          <p>${escapeHTML(n.summary || group.note)}</p>
        </div>
        <div class="detail-card">
          <h3>上游来源</h3>
          ${listHtml(incoming, "没有上游，属于入口节点。")}
        </div>
        <div class="detail-card">
          <h3>下游去向</h3>
          ${listHtml(outgoing, "没有下游，属于结果或保留节点。")}
        </div>
        <div class="detail-card">
          <h3>落档口径</h3>
          <p>${nodeArchiveNote(n)}</p>
        </div>
      `;
    }

    function nodeArchiveNote(n) {
      if (n.group === "confirm" || n.id.includes("chairman") || n.id.includes("decision")) {
        return "涉及董事长判断的内容，只记录“谁确认、确认结果、原因口径”，不替董事长或 Oscar 直接派活。";
      }
      if (n.group === "feishu") {
        return "同步到飞书后，要能从文件、表格、日志三处追到来源和状态。";
      }
      if (n.group === "daily") {
        return "本地处理只产出事实、索引、小结和待处理项；有冲突的内容必须进入确认链路。";
      }
      if (n.group === "package" || n.group === "feature") {
        return "诊断结果要说明已确定、未核对、不能下结论和下一步，不把 Figma 说法直接当成可上线结论。";
      }
      return "该节点保留为流程中的可追溯点，用来说明材料从哪来、流到哪里、后续谁处理。";
    }

    function listHtml(items, fallback) {
      if (!items.length) return `<p>${fallback}</p>`;
      return `<ul>${items.slice(0, 8).map((item) => `<li>${escapeHTML(item)}</li>`).join("")}</ul>`;
    }

    function pointerPosition(event) {
      const rect = canvas.getBoundingClientRect();
      return { x: event.clientX - rect.left, y: event.clientY - rect.top };
    }

    function screenToWorld(point) {
      return { x: (point.x - offsetX) / scale, y: (point.y - offsetY) / scale };
    }

    function hitTest(point) {
      const w = screenToWorld(point);
      let best = null;
      let bestDist = Infinity;
      for (const n of nodes) {
        const d = Math.hypot(w.x - n.x, w.y - n.y);
        if (d < n.size + 10 && d < bestDist && nodeVisibility(n) > .08) {
          best = n;
          bestDist = d;
        }
      }
      return best;
    }

    canvas.addEventListener("pointermove", (event) => {
      const point = pointerPosition(event);
      const worldPoint = screenToWorld(point);
      if (dragNode) {
        if (dragOrigin && Math.hypot(point.x - dragOrigin.x, point.y - dragOrigin.y) > 3) {
          dragNode.pinned = true;
        }
        dragNode.x = clamp(worldPoint.x, 26, world.width - 26);
        dragNode.y = clamp(worldPoint.y, 26, world.height - 26);
        dragNode.vx = 0;
        dragNode.vy = 0;
        return;
      }
      if (isPanning && lastPointer) {
        offsetX += point.x - lastPointer.x;
        offsetY += point.y - lastPointer.y;
        lastPointer = point;
        return;
      }
      const hit = hitTest(point);
      hoveredId = hit ? hit.id : null;
      canvas.style.cursor = hit ? "pointer" : "grab";
    });

    canvas.addEventListener("pointerdown", (event) => {
      const point = pointerPosition(event);
      const hit = hitTest(point);
      if (hit) {
        dragNode = hit;
        selectNode(hit.id);
      } else {
        isPanning = true;
      }
      lastPointer = point;
      dragOrigin = point;
      canvas.setPointerCapture(event.pointerId);
    });

    canvas.addEventListener("pointerup", (event) => {
      dragNode = null;
      isPanning = false;
      lastPointer = null;
      dragOrigin = null;
      canvas.releasePointerCapture(event.pointerId);
    });

    canvas.addEventListener("pointercancel", () => {
      dragNode = null;
      isPanning = false;
      lastPointer = null;
      dragOrigin = null;
    });

    canvas.addEventListener("dblclick", (event) => {
      const hit = hitTest(pointerPosition(event));
      if (hit) {
        activeGroup = hit.group;
        document.querySelectorAll(".filter").forEach((item) => item.classList.toggle("active", item.dataset.group === activeGroup));
        graphBadge.textContent = `${groups[activeGroup].name}：${groups[activeGroup].note}`;
      } else {
        activeGroup = "all";
        activePath = null;
        document.querySelectorAll(".filter").forEach((item) => item.classList.toggle("active", item.dataset.group === "all"));
        document.querySelectorAll(".path-button").forEach((item) => item.classList.remove("active"));
        graphBadge.textContent = "当前显示全部节点。核心入口是“扫描新增材料”和“进入问诊”。";
      }
    });

    canvas.addEventListener("wheel", (event) => {
      event.preventDefault();
      const point = pointerPosition(event);
      const before = screenToWorld(point);
      const delta = event.deltaY > 0 ? .9 : 1.1;
      scale = clamp(scale * delta, .36, 2.2);
      offsetX = point.x - before.x * scale;
      offsetY = point.y - before.y * scale;
    }, { passive: false });

    searchInput.addEventListener("input", () => {
      searchTerm = searchInput.value.trim().toLowerCase();
      const found = nodes.find((n) => n.label.toLowerCase().includes(searchTerm));
      if (found && searchTerm.length >= 2) selectNode(found.id);
    });

    window.addEventListener("resize", resize);

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function trimLabel(value, max) {
      return value.length > max ? `${value.slice(0, max - 1)}…` : value;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function mixColor(a, b) {
      return a === b ? a : "#8a94a6";
    }

    function roundRect(context, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      context.beginPath();
      context.moveTo(x + radius, y);
      context.arcTo(x + w, y, x + w, y + h, radius);
      context.arcTo(x + w, y + h, x, y + h, radius);
      context.arcTo(x, y + h, x, y, radius);
      context.arcTo(x, y, x + w, y, radius);
      context.closePath();
    }

    setup();
  </script>
</body>
</html>

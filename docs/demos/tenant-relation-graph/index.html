<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OPC 租户点状关系图</title>
  <style>
    :root {
      --bg: #eef4fb;
      --paper: #ffffff;
      --ink: #102037;
      --muted: #607089;
      --line: #cdd9e8;
      --blue: #236bd6;
      --green: #15935f;
      --orange: #e2762b;
      --purple: #7457d9;
      --red: #d84a45;
      --cyan: #0896a8;
      --slate: #65758b;
      --shadow: 0 20px 58px rgba(16, 32, 55, .12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 10%, rgba(35, 107, 214, .14), transparent 32%),
        linear-gradient(180deg, #f8fbff 0%, #eef4fb 100%);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      width: 100vw;
      height: 100vh;
      min-height: 0;
    }

    .header {
      display: grid;
      grid-template-columns: minmax(360px, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(205, 217, 232, .9);
      background: rgba(255, 255, 255, .88);
      backdrop-filter: blur(16px);
      box-shadow: 0 12px 34px rgba(16, 32, 55, .07);
    }

    h1 {
      margin: 0 0 6px;
      color: #0c1a2e;
      font-size: 24px;
      line-height: 1.15;
      font-weight: 920;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 112px);
      gap: 8px;
    }

    .stat {
      min-height: 58px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .stat strong {
      display: block;
      color: #0c1a2e;
      font-size: 22px;
      line-height: 1;
      font-weight: 920;
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .workspace {
      display: grid;
      grid-template-columns: 288px minmax(0, 1fr) 340px;
      min-height: 0;
    }

    .side {
      min-height: 0;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, .72);
      backdrop-filter: blur(16px);
    }

    .side.right {
      border-right: 0;
      border-left: 1px solid var(--line);
    }

    .side-inner {
      height: 100%;
      overflow: auto;
      padding: 16px;
    }

    .search {
      margin-bottom: 14px;
    }

    .search input {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      outline: 0;
      color: var(--ink);
      background: #fff;
      font-size: 13px;
    }

    .search input:focus {
      border-color: rgba(35, 107, 214, .7);
      box-shadow: 0 0 0 3px rgba(35, 107, 214, .12);
    }

    .section-title {
      margin: 14px 0 9px;
      color: #33445f;
      font-size: 12px;
      font-weight: 900;
    }

    .mode-list,
    .group-list,
    .path-list {
      display: grid;
      gap: 8px;
    }

    .mode-btn,
    .group-btn,
    .path-btn {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 9px;
      align-items: center;
      width: 100%;
      min-height: 40px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #30425d;
      background: #fff;
      text-align: left;
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
    }

    .group-btn {
      grid-template-columns: 12px minmax(0, 1fr) auto;
    }

    .mode-btn:hover,
    .group-btn:hover,
    .path-btn:hover,
    .mode-btn.active,
    .group-btn.active,
    .path-btn.active {
      transform: translateY(-1px);
      border-color: rgba(35, 107, 214, .55);
      box-shadow: 0 10px 26px rgba(16, 32, 55, .09);
    }

    .mode-btn b,
    .group-btn b,
    .path-btn b {
      overflow: hidden;
      font-size: 13px;
      font-weight: 900;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mode-btn small,
    .group-btn small,
    .path-btn small {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
    }

    .note {
      margin-top: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: #4c5d76;
      background: rgba(255, 255, 255, .78);
      font-size: 12px;
      line-height: 1.65;
    }

    .graph {
      position: relative;
      min-width: 0;
      min-height: 0;
      background:
        linear-gradient(rgba(16, 32, 55, .045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16, 32, 55, .045) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .toolbar {
      position: absolute;
      z-index: 3;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
    }

    .tools {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 6px;
      border: 1px solid rgba(205, 217, 232, .94);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .88);
      box-shadow: 0 12px 32px rgba(16, 32, 55, .09);
      backdrop-filter: blur(14px);
      pointer-events: auto;
    }

    .tool {
      min-width: 34px;
      height: 32px;
      padding: 0 10px;
      border: 1px solid transparent;
      border-radius: 7px;
      color: #41536d;
      background: transparent;
      font-size: 12px;
      font-weight: 900;
    }

    .tool:hover {
      border-color: rgba(35, 107, 214, .36);
      color: #0c1a2e;
      background: #fff;
    }

    .badge {
      position: absolute;
      left: 16px;
      bottom: 16px;
      max-width: min(560px, calc(100% - 32px));
      padding: 11px 13px;
      border: 1px solid rgba(205, 217, 232, .92);
      border-radius: var(--radius);
      color: #4a5b73;
      background: rgba(255, 255, 255, .9);
      box-shadow: 0 12px 32px rgba(16, 32, 55, .08);
      backdrop-filter: blur(14px);
      font-size: 12px;
      line-height: 1.55;
    }

    .detail-head {
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .detail-group {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 9px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .detail-head h2 {
      margin: 0;
      color: #0c1a2e;
      font-size: 20px;
      line-height: 1.25;
      font-weight: 920;
    }

    .detail-card {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .detail-card h3 {
      margin: 0 0 8px;
      color: #33445f;
      font-size: 12px;
      font-weight: 920;
    }

    .detail-card p,
    .detail-card li {
      color: #4c5d76;
      font-size: 13px;
      line-height: 1.65;
    }

    .detail-card p {
      margin: 0;
    }

    .detail-card ul {
      display: grid;
      gap: 5px;
      margin: 0;
      padding-left: 18px;
    }

    .empty {
      display: grid;
      min-height: 210px;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    @media (max-width: 1160px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
      }

      .header {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(3, 1fr);
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .side,
      .side.right {
        border: 0;
        border-bottom: 1px solid var(--line);
      }

      .side-inner {
        overflow: visible;
      }

      .mode-list,
      .group-list,
      .path-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .graph {
        height: 72vh;
        min-height: 640px;
      }
    }

    @media (max-width: 680px) {
      .header {
        padding: 16px;
      }

      h1 {
        font-size: 22px;
      }

      .stats,
      .mode-list,
      .group-list,
      .path-list {
        grid-template-columns: 1fr;
      }

      .toolbar {
        position: sticky;
        top: 8px;
        align-items: stretch;
        flex-direction: column;
      }

      .tools {
        width: 100%;
      }

      .tool {
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <h1>OPC 租户点状关系图</h1>
        <p>按 `OPC 租户.xmind` 重建：商品招商链路、分销招商链路、CPS 帮卖链路、B2B 中台、外部平台、订单与分账放在同一张可拖拽关系图里。</p>
      </div>
      <div class="stats" aria-label="图谱统计">
        <div class="stat"><strong id="nodeCount">0</strong><span>节点</span></div>
        <div class="stat"><strong id="edgeCount">0</strong><span>关系</span></div>
        <div class="stat"><strong id="groupCount">0</strong><span>分组</span></div>
      </div>
    </header>

    <main class="workspace">
      <aside class="side">
        <div class="side-inner">
          <div class="search">
            <input id="searchInput" type="search" placeholder="搜索：供应商、经销商、CPS、订单、分账" />
          </div>

          <div class="section-title">视图模式</div>
          <div class="mode-list" id="modeList"></div>

          <div class="section-title">按分组看</div>
          <div class="group-list" id="groupList"></div>

          <div class="section-title">关键链路</div>
          <div class="path-list" id="pathList"></div>

          <div class="note">
            默认只显示主干节点，避免像全量脑图一样糊成一团。拖动空白处移动画布，拖动节点会固定位置；点“解锁”恢复自动布局。
          </div>
        </div>
      </aside>

      <section class="graph">
        <div class="toolbar">
          <div></div>
          <div class="tools">
            <button class="tool" id="zoomOut" type="button">-</button>
            <button class="tool" id="zoomIn" type="button">+</button>
            <button class="tool" id="fitView" type="button">复位</button>
            <button class="tool" id="unlockNodes" type="button">解锁</button>
          </div>
        </div>
        <canvas id="graphCanvas" aria-label="OPC 租户点状关系图"></canvas>
        <div class="badge" id="badge">当前是“主干总览”：只看平台、供应商、招商、经销商、CPS、订单、发货、分账之间的主关系。</div>
      </section>

      <aside class="side right">
        <div class="side-inner" id="detailPanel">
          <div class="empty">点击图上的节点后，这里会显示它在 OPC 租户里的业务含义、上游来源和下游去向。</div>
        </div>
      </aside>
    </main>
  </div>

    const nodeById = new Map(nodes.map((node) => [node.id, node]));

    const canvas = document.getElementById("graphCanvas");

    function setup() {
      document.getElementById("nodeCount").textContent = nodes.length;

    function buildModes() {
      for (const [key, mode] of Object.entries(modes)) {
        const btn = document.createElement("button");

      }
      modeList.addEventListener("click", (event) => {
        const btn = event.target.closest("button");
        if (!btn) return;
        activeMode = btn.dataset.mode;
        activeGroup = "all";
        activePath = null;
        searchTerm = "";
        searchInput.value = "";
        updateControls();

        fitView();

    function buildGroups() {

      groupList.appendChild(all);

        btn.dataset.group = key;
        btn.innerHTML = `<span class="dot" style="background:${group.color}"></span><b>${escapeHTML(group.name)}</b><small>${count}</small>`;
        groupList.appendChild(btn);
      }
      groupList.addEventListener("click", (event) => {

    function buildPaths() {
      for (const [key, path] of Object.entries(paths)) {
        const btn = document.createElement("button");
        btn.className = "path-btn";
        btn.dataset.path = key;
        btn.innerHTML = `<b>${escapeHTML(path.name)}</b><small>${path.nodes.length} 点</small>`;
        pathList.appendChild(btn);
      }
      pathList.addEventListener("click", (event) => {
        const btn = event.target.closest("button");
        if (!btn) return;
        activePath = activePath === btn.dataset.path ? null : btn.dataset.path;
        activeMode = activePath ? "all" : "overview";
        activeGroup = "all";
        updateControls();
        selectFirstVisible();
        fitView();
        updateBadge();
      });
    }

    function seedLayout() {
      const byGroup = {};
      for (const node of nodes) {
        if (!byGroup[node.group]) byGroup[node.group] = [];
        byGroup[node.group].push(node);
      }
      for (const [key, items] of Object.entries(byGroup)) {
        const group = groups[key];
        items.forEach((node, index) => {
          const angle = index * 2.399963 + group.x * .004;
          const radius = 26 + Math.sqrt(index) * 28;
          node.x = group.x + Math.cos(angle) * radius;
          node.y = group.y + Math.sin(angle) * radius;
        });
      }
    }

    function wireEvents() {
      document.getElementById("zoomIn").addEventListener("click", () => zoomAtCenter(1.16));
      document.getElementById("zoomOut").addEventListener("click", () => zoomAtCenter(.86));
      document.getElementById("fitView").addEventListener("click", fitView);
      document.getElementById("unlockNodes").addEventListener("click", () => {
        nodes.forEach((node) => node.pinned = false);
        badge.textContent = "已解锁节点，布局会重新靠回分组中心。";
      });
      searchInput.addEventListener("input", () => {
        searchTerm = searchInput.value.trim().toLowerCase();
        if (searchTerm.length >= 2) {
          activeMode = "all";
          activeGroup = "all";
          activePath = null;
          updateControls();
          selectFirstVisible();
          fitView();
        }
      });
      window.addEventListener("resize", resize);
      canvas.addEventListener("pointermove", pointerMove);
      canvas.addEventListener("pointerdown", pointerDown);
      canvas.addEventListener("pointerup", pointerUp);
      canvas.addEventListener("pointercancel", pointerUp);
      canvas.addEventListener("dblclick", (event) => {
        const hit = hitTest(pointerPosition(event));
        if (hit) {
          activeGroup = hit.group;
          activeMode = "all";
          activePath = null;
          updateControls();
          updateBadge();
        } else {
          activeMode = "overview";
          activeGroup = "all";
          activePath = null;
          updateControls();
          fitView();
          updateBadge();
        }
      });
      canvas.addEventListener("wheel", (event) => {
        event.preventDefault();
        const point = pointerPosition(event);
        const before = screenToWorld(point);
        scale = clamp(scale * (event.deltaY > 0 ? .9 : 1.1), .34, 2.25);
        offsetX = point.x - before.x * scale;
        offsetY = point.y - before.y * scale;
      }, { passive: false });
    }

    function updateControls() {
      document.querySelectorAll(".mode-btn").forEach((btn) => btn.classList.toggle("active", btn.dataset.mode === activeMode));
      document.querySelectorAll(".group-btn").forEach((btn) => btn.classList.toggle("active", btn.dataset.group === activeGroup));
      document.querySelectorAll(".path-btn").forEach((btn) => btn.classList.toggle("active", btn.dataset.path === activePath));
    }

    function updateBadge() {
      if (activePath) {
        badge.textContent = `${paths[activePath].name}：当前只高亮这条链路，可拖动节点重新排版。`;
      } else if (activeGroup !== "all") {
        badge.textContent = `${groups[activeGroup].name}：${groups[activeGroup].note}`;
      } else {
        badge.textContent = `${modes[activeMode].name}：${modes[activeMode].hint}`;
      }
    }

    function selectFirstVisible() {
      const visible = visibleSet();
      const next = nodes.find((node) => visible.has(node.id));
      if (next) selectNode(next.id);
    }

    function resize() {
      const rect = canvas.getBoundingClientRect();
      width = Math.max(320, rect.width);
      height = Math.max(420, rect.height);
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      fitView();
    }

    function visibleSet() {
      if (activePath) return new Set(paths[activePath].nodes);
      if (searchTerm) {
        const found = new Set(nodes
          .filter((node) => node.label.toLowerCase().includes(searchTerm) || node.summary.toLowerCase().includes(searchTerm) || groups[node.group].name.toLowerCase().includes(searchTerm))
          .map((node) => node.id));
        for (const id of [...found]) {
          const refs = linked.get(id);
          refs.in.forEach((link) => found.add(link.source));
          refs.out.forEach((link) => found.add(link.target));
        }
        return found;
      }
      if (activeGroup !== "all") return new Set(nodes.filter((node) => node.group === activeGroup).map((node) => node.id));
      if (activeMode !== "all" && modes[activeMode].nodes) return new Set(modes[activeMode].nodes);
      return new Set(nodes.map((node) => node.id));
    }

    function visibleBounds() {
      const visible = visibleSet();
      const shown = nodes.filter((node) => visible.has(node.id));
      if (!shown.length) return { minX: 0, minY: 0, maxX: world.width, maxY: world.height };
      return shown.reduce((acc, node) => ({
        minX: Math.min(acc.minX, node.x - 90),
        minY: Math.min(acc.minY, node.y - 90),
        maxX: Math.max(acc.maxX, node.x + 90),
        maxY: Math.max(acc.maxY, node.y + 90)
      }), { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity });
    }

    function fitView() {
      const bounds = visibleBounds();
      const padding = width < 680 ? 50 : 110;
      const boundsW = Math.max(260, bounds.maxX - bounds.minX);
      const boundsH = Math.max(260, bounds.maxY - bounds.minY);
      scale = clamp(Math.min((width - padding) / boundsW, (height - padding) / boundsH), .42, 1.35);
      offsetX = (width - (bounds.minX + bounds.maxX) * scale) / 2;
      offsetY = (height - (bounds.minY + bounds.maxY) * scale) / 2;
    }

    function zoomAtCenter(delta) {
      const point = { x: width / 2, y: height / 2 };
      const before = screenToWorld(point);
      scale = clamp(scale * delta, .34, 2.25);
      offsetX = point.x - before.x * scale;
      offsetY = point.y - before.y * scale;
    }

    function loop() {
      tick();
      draw();
      requestAnimationFrame(loop);
    }

    function tick() {
      const visible = visibleSet();
      for (const node of nodes) {
        if (!visible.has(node.id) || node.pinned) continue;
        const group = groups[node.group];
        const force = node.core ? .018 : .012;
        node.vx += (group.x - node.x) * force;
        node.vy += (group.y - node.y) * force;
      }

      for (const link of links) {
        if (!visible.has(link.source) || !visible.has(link.target)) continue;
        const a = nodeById.get(link.source);
        const b = nodeById.get(link.target);
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.max(1, Math.hypot(dx, dy));
        const desired = activePath ? 140 : 118;
        const force = (dist - desired) * .0035;
        const fx = dx / dist * force;
        const fy = dy / dist * force;
        if (!a.pinned) {
          a.vx += fx;
          a.vy += fy;
        }
        if (!b.pinned) {
          b.vx -= fx;
          b.vy -= fy;
        }
      }

      for (let i = 0; i < nodes.length; i++) {
        const a = nodes[i];
        if (!visible.has(a.id)) continue;
        for (let j = i + 1; j < nodes.length; j++) {
          const b = nodes[j];
          if (!visible.has(b.id)) continue;
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist2 = dx * dx + dy * dy + .01;
          if (dist2 > 50000) continue;
          const force = (a.group === b.group ? 64 : 112) / dist2;
          if (!a.pinned) {
            a.vx -= dx * force;
            a.vy -= dy * force;
          }
          if (!b.pinned) {
            b.vx += dx * force;
            b.vy += dy * force;
          }
        }
      }

      for (const node of nodes) {
        if (!visible.has(node.id) || node.pinned || dragNode === node) continue;
        node.vx *= .82;
        node.vy *= .82;
        node.x = clamp(node.x + node.vx, 24, world.width - 24);
        node.y = clamp(node.y + node.vy, 24, world.height - 24);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      ctx.save();
      ctx.translate(offsetX, offsetY);
      ctx.scale(scale, scale);
      drawGroups();
      drawLinks();
      drawNodes();
      ctx.restore();
    }

    function drawGroups() {
      const visible = visibleSet();
      for (const [key, group] of Object.entries(groups)) {
        if (!nodes.some((node) => node.group === key && visible.has(node.id))) continue;
        ctx.save();
        ctx.globalAlpha = .08;
        ctx.fillStyle = group.color;
        ctx.beginPath();
        ctx.arc(group.x, group.y, key === "platform" || key === "transaction" ? 176 : 150, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = .82;
        ctx.fillStyle = "#33445f";
        ctx.font = "800 18px -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif";
        ctx.fillText(group.name, group.x - 45, group.y - 126);
        ctx.restore();
      }
    }

    function drawLinks() {
      for (const link of links) {
        const alpha = edgeVisibility(link);
        if (alpha <= .03) continue;
        const a = nodeById.get(link.source);
        const b = nodeById.get(link.target);
        const highlighted = activePath && paths[activePath].nodes.includes(link.source) && paths[activePath].nodes.includes(link.target);
        drawArrow(a, b, alpha, highlighted);
      }
    }

    function drawArrow(a, b, alpha, highlighted) {
      const color = highlighted ? "#0c1a2e" : (a.group === b.group ? groups[a.group].color : "#8190a6");
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.max(1, Math.hypot(dx, dy));
      const ux = dx / dist;
      const uy = dy / dist;
      const startX = a.x + ux * (a.size + 5);
      const startY = a.y + uy * (a.size + 5);
      const endX = b.x - ux * (b.size + 8);
      const endY = b.y - uy * (b.size + 8);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = color;
      ctx.lineWidth = highlighted ? 2.8 : 1.2;
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(endX, endY);
      ctx.stroke();
      const size = highlighted ? 8 : 6;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(endX, endY);
      ctx.lineTo(endX - ux * size - uy * size * .55, endY - uy * size + ux * size * .55);
      ctx.lineTo(endX - ux * size + uy * size * .55, endY - uy * size - ux * size * .55);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawNodes() {
      const ordered = nodes.slice().sort((a, b) => nodeVisibility(a) - nodeVisibility(b));
      for (const node of ordered) {
        const visibility = nodeVisibility(node);
        if (visibility <= .03) continue;
        const group = groups[node.group];
        const selected = node.id === selectedId;
        const hovered = node.id === hoveredId;
        const inPath = activePath && paths[activePath].nodes.includes(node.id);
        const searched = searchTerm && node.label.toLowerCase().includes(searchTerm);
        const r = node.size + (selected ? 7 : hovered ? 4 : inPath || searched ? 3 : 0);
        ctx.save();
        ctx.globalAlpha = visibility;
        ctx.shadowColor = selected || hovered ? "rgba(16,32,55,.25)" : "rgba(16,32,55,.12)";
        ctx.shadowBlur = selected || hovered ? 22 : 9;
        ctx.fillStyle = group.color;
        ctx.beginPath();
        ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.lineWidth = selected ? 4 : node.core ? 2.8 : 1.8;
        ctx.strokeStyle = selected ? "#0c1a2e" : "rgba(255,255,255,.92)";
        ctx.stroke();
        const compact = activeMode !== "all" || activePath || activeGroup !== "all" || searchTerm;
        if (selected || hovered || node.core || inPath || searched || compact && scale > .55) {
          const label = trim(node.label, selected || hovered ? 24 : 16);
          ctx.font = `${selected ? 850 : 760} ${selected ? 15 : 12}px -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif`;
          const metrics = ctx.measureText(label);
          const bx = node.x + r + 7;
          const by = node.y - 11;
          ctx.fillStyle = "rgba(255,255,255,.9)";
          roundRect(ctx, bx - 6, by - 1, metrics.width + 12, 23, 7);
          ctx.fill();
          ctx.fillStyle = selected ? "#0c1a2e" : "#33445f";
          ctx.fillText(label, bx, by + 15);
        }
        ctx.restore();
      }
    }

    function nodeVisibility(node) {
      const visible = visibleSet();
      if (!visible.has(node.id)) return 0;
      let value = 1;
      if (selectedId && activeMode === "all" && !activePath && activeGroup === "all" && !searchTerm) {
        const refs = linked.get(selectedId);
        const close = selectedId === node.id || refs.in.some((l) => l.source === node.id) || refs.out.some((l) => l.target === node.id);
        if (!close) value *= .45;
      }
      if (searchTerm && !node.label.toLowerCase().includes(searchTerm) && !node.summary.toLowerCase().includes(searchTerm)) value *= .55;
      return value;
    }

    function edgeVisibility(link) {
      const visible = visibleSet();
      if (!visible.has(link.source) || !visible.has(link.target)) return 0;
      let value = .48;
      if (selectedId && (link.source === selectedId || link.target === selectedId)) value = .96;
      if (activePath) value = paths[activePath].nodes.includes(link.source) && paths[activePath].nodes.includes(link.target) ? .94 : .14;
      if (searchTerm) {
        const a = nodeById.get(link.source);
        const b = nodeById.get(link.target);
        if (!a.label.toLowerCase().includes(searchTerm) && !b.label.toLowerCase().includes(searchTerm)) value *= .4;
      }
      return value;
    }

    function selectNode(id) {
      selectedId = id;
      const node = nodeById.get(id);
      if (!node) return;
      const group = groups[node.group];
      const refs = linked.get(id);
      const incoming = refs.in.map((link) => `${nodeById.get(link.source).label} - ${link.label}`);
      const outgoing = refs.out.map((link) => `${link.label} - ${nodeById.get(link.target).label}`);
      detailPanel.innerHTML = `
        <div class="detail-head">
          <div class="detail-group"><span class="dot" style="background:${group.color}"></span>${escapeHTML(group.name)}</div>
          <h2>${escapeHTML(node.label)}</h2>
        </div>
        <div class="detail-card"><h3>业务含义</h3><p>${escapeHTML(node.summary)}</p></div>
        <div class="detail-card"><h3>上游来源</h3>${listHtml(incoming, "没有上游，属于入口或基础节点。")}</div>
        <div class="detail-card"><h3>下游去向</h3>${listHtml(outgoing, "没有下游，属于结果或沉淀节点。")}</div>
        <div class="detail-card"><h3>读图口径</h3><p>${escapeHTML(readingNote(node))}</p></div>
      `;
    }

    function readingNote(node) {
      if (node.group === "settlement") return "这里是钱和佣金的归口，必须和订单状态、组织关系、外部分账口径一起看。";
      if (node.group === "transaction") return "这里是订单生命周期，决定后续发货、售后、结算和数据沉淀。";
      if (node.group === "cps") return "这里是内容成交链路，重点看微信小店、优选联盟、达人/推客和消费者之间怎么串起来。";
      if (node.group === "distribution") return "这里是经销商层级关系，重点看 Vip 级别、员工归属、选品和订单汇聚。";
      if (node.group === "invite") return "这里是商品招商层级，重点看邀请码、V 级别和高级招低级的限制。";
      if (node.group === "supplier") return "这里是货源入口，重点看商品上架、供货中心、ERP/WMS 和供货模式。";
      return "这里是平台控制面，负责配置规则、组织关系、商品、订单和经营分析。";
    }

    function listHtml(items, fallback) {
      if (!items.length) return `<p>${fallback}</p>`;
      return `<ul>${items.slice(0, 10).map((item) => `<li>${escapeHTML(item)}</li>`).join("")}</ul>`;
    }

    function pointerPosition(event) {
      const rect = canvas.getBoundingClientRect();
      return { x: event.clientX - rect.left, y: event.clientY - rect.top };
    }

    function screenToWorld(point) {
      return { x: (point.x - offsetX) / scale, y: (point.y - offsetY) / scale };
    }

    function hitTest(point) {
      const w = screenToWorld(point);
      let best = null;
      let bestDist = Infinity;
      for (const node of nodes) {
        const d = Math.hypot(w.x - node.x, w.y - node.y);
        if (d < node.size + 11 && d < bestDist && nodeVisibility(node) > .08) {
          best = node;
          bestDist = d;
        }
      }
      return best;
    }

    function pointerMove(event) {
      const point = pointerPosition(event);
      const worldPoint = screenToWorld(point);
      if (dragNode) {
        if (dragOrigin && Math.hypot(point.x - dragOrigin.x, point.y - dragOrigin.y) > 3) dragNode.pinned = true;
        dragNode.x = clamp(worldPoint.x, 24, world.width - 24);
        dragNode.y = clamp(worldPoint.y, 24, world.height - 24);
        dragNode.vx = 0;
        dragNode.vy = 0;
        return;
      }
      if (isPanning && lastPointer) {
        offsetX += point.x - lastPointer.x;
        offsetY += point.y - lastPointer.y;
        lastPointer = point;
        return;
      }
      const hit = hitTest(point);
      hoveredId = hit ? hit.id : null;
      canvas.style.cursor = hit ? "pointer" : "grab";
    }

    function pointerDown(event) {
      const point = pointerPosition(event);
      const hit = hitTest(point);
      if (hit) {
        dragNode = hit;
        selectNode(hit.id);
      } else {
        isPanning = true;
      }
      lastPointer = point;
      dragOrigin = point;
      canvas.setPointerCapture(event.pointerId);
    }

    function pointerUp(event) {
      dragNode = null;
      isPanning = false;
      lastPointer = null;
      dragOrigin = null;
      if (event && canvas.hasPointerCapture && canvas.hasPointerCapture(event.pointerId)) {
        canvas.releasePointerCapture(event.pointerId);
      }
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function trim(value, max) {
      return value.length > max ? `${value.slice(0, max - 1)}…` : value;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function roundRect(context, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      context.beginPath();
      context.moveTo(x + radius, y);
      context.arcTo(x + w, y, x + w, y + h, radius);
      context.arcTo(x + w, y + h, x, y + h, radius);
      context.arcTo(x, y + h, x, y, radius);
      context.arcTo(x, y, x + w, y, radius);
      context.closePath();
    }

    setup();
  </script>
</body>
</html>
